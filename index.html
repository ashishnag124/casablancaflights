<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Flights Overhead</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #map { width: 100%; height: 100dvh; }

    /* Status bar */
    #status {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(15, 15, 30, 0.75);
      color: #cbd5e1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      padding: 7px 12px;
      border-radius: 10px;
      z-index: 1000;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      line-height: 1.4;
    }
    #status .count { font-weight: 700; color: #7dd3fc; }

    /* Legend */
    #legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(15, 15, 30, 0.75);
      color: #cbd5e1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 10px;
      z-index: 1000;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      line-height: 1.8;
    }
    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* Plane icon */
    .plane-icon { display: flex; align-items: center; justify-content: center; }

    /* Persistent plane tooltip */
    .plane-tooltip {
      background: rgba(15, 15, 30, 0.82);
      border: none !important;
      border-radius: 5px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 7px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      line-height: 1.5;
      text-align: center;
      pointer-events: none;
    }
    .plane-tooltip::before { display: none !important; } /* hide arrow */

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.25);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .leaflet-popup-content { margin: 14px 16px; min-width: 195px; }
    .leaflet-popup-tip-container { display: block; }

    .popup-flight {
      font-size: 19px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .popup-aircraft {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .popup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
    }
    .popup-item { display: flex; flex-direction: column; gap: 1px; }
    .popup-label {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #94a3b8;
      font-weight: 700;
    }
    .popup-value {
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
    }
    .popup-route {
      font-size: 15px;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 2px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status">Connecting...</div>
  <div id="legend">
    <div><span class="legend-dot" style="background:#f59e0b"></span>Below 5,000 ft</div>
    <div><span class="legend-dot" style="background:#38bdf8"></span>5,000 – 15,000 ft</div>
    <div><span class="legend-dot" style="background:#818cf8"></span>Above 15,000 ft</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Config ────────────────────────────────────────────────────────────────
    const CENTER     = [37.438264, -122.183802];
    const REFRESH_MS = 30000; // 30s — respects OpenSky anonymous rate limits

    // Bounding box ~25 nautical miles around CENTER
    const BBOX = { lamin: 37.022, lamax: 37.854, lomin: -122.707, lomax: -121.661 };

    // OpenSky state vector indices
    const F = { ICAO:0, CALLSIGN:1, COUNTRY:2, LON:5, LAT:6, ALT_M:7, ON_GROUND:8, VEL_MS:9, TRACK:10, SQUAWK:14 };

    // ── Map ───────────────────────────────────────────────────────────────────
    const map = L.map('map', {
      center: [37.52, -122.15],
      zoom: 12,
      scrollWheelZoom: true,
      touchZoom: true,
      doubleClickZoom: false,
      zoomControl: true,
    });
    map.dragging.disable();

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // Home marker
    L.circleMarker(CENTER, {
      radius: 7,
      color: '#ef4444',
      fillColor: '#ef4444',
      fillOpacity: 0.85,
      weight: 2,
    }).addTo(map).bindTooltip('📍 Home', { permanent: false, direction: 'top' });

    // ── Helpers ───────────────────────────────────────────────────────────────
    const mToFt   = m  => m  != null ? Math.round(m  * 3.28084) : null;
    const msToKts = ms => ms != null ? Math.round(ms * 1.94384) : null;

    function altColor(altFt) {
      if (altFt == null) return '#94a3b8';
      if (altFt < 5000)  return '#f59e0b';
      if (altFt < 15000) return '#38bdf8';
      return '#818cf8';
    }

    function planeSvg(heading, color) {
      return `<div class="plane-icon" style="transform:rotate(${heading}deg);width:36px;height:36px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="36" height="36">
          <path d="M50 6 L57 40 L92 53 L92 62 L57 52 L61 82 L72 88 L72 94 L50 87 L28 94 L28 88 L39 82 L43 52 L8 62 L8 53 L43 40 Z"
                fill="${color}" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
        </svg>
      </div>`;
    }

    function fmtAlt(altFt) {
      if (altFt == null) return '—';
      return `${altFt.toLocaleString()} ft`;
    }

    function fmtHeading(track) {
      if (track == null) return '—';
      const dirs = ['N','NE','E','SE','S','SW','W','NW'];
      return `${Math.round(track)}° ${dirs[Math.round(track / 45) % 8]}`;
    }



    // ── FlightAware ───────────────────────────────────────────────────────────
    // API key is kept server-side in the Netlify function (netlify/functions/flight.js)
    const faCache  = new Map(); // callsign → flight data (cached to avoid repeat API calls)

    async function fetchFlightDetails(callsign, popup) {
      // Return cached result immediately without an API call
      if (faCache.has(callsign)) {
        popup.setContent(enrichedPopup(popup._source, faCache.get(callsign)));
        return;
      }
      try {
        const res = await fetch(`/.netlify/functions/flight?ident=${encodeURIComponent(callsign)}`);
        if (!res.ok) throw new Error(`FA ${res.status}`);
        const data = await res.json();
        const f = (data.flights || [])[0] || null;
        faCache.set(callsign, f);
        if (popup.isOpen()) popup.setContent(enrichedPopup(popup._source, f));
      } catch (err) {
        console.warn('FlightAware error:', err);
        // Leave popup as-is with the OpenSky data
      }
    }

    function enrichedPopup(s, f) {
      const callsign = (s[F.CALLSIGN] || '').trim() || s[F.ICAO]?.toUpperCase() || '?';
      const altFt    = mToFt(s[F.ALT_M]);
      const kts      = msToKts(s[F.VEL_MS]);

      const route = f
        ? `${f.origin?.code_iata || f.origin?.code_icao || '?'} → ${f.destination?.code_iata || f.destination?.code_icao || '?'}`
        : null;
      const airline  = f?.operator_iata || f?.operator || null;
      const acType   = f?.aircraft_type || null;
      const status   = f?.status || null;

      return `
        <div class="popup-flight">${callsign}</div>
        ${route  ? `<div class="popup-route">${route}</div>` : ''}
        ${airline || acType ? `<div class="popup-aircraft">${[airline, acType].filter(Boolean).join(' · ')}</div>` : ''}
        <div class="popup-grid">
          <div class="popup-item">
            <span class="popup-label">Altitude</span>
            <span class="popup-value">${fmtAlt(altFt)}</span>
          </div>
          <div class="popup-item">
            <span class="popup-label">Speed</span>
            <span class="popup-value">${kts != null ? kts + ' kts' : '—'}</span>
          </div>
          <div class="popup-item">
            <span class="popup-label">Heading</span>
            <span class="popup-value">${fmtHeading(s[F.TRACK])}</span>
          </div>
          <div class="popup-item">
            <span class="popup-label">Status</span>
            <span class="popup-value">${status || s[F.SQUAWK] || '—'}</span>
          </div>
        </div>`;
    }

    // ── State ─────────────────────────────────────────────────────────────────
    const markers  = new Map(); // icao → L.marker
    const statusEl = document.getElementById('status');

    // ── Fetch & render ────────────────────────────────────────────────────────
    async function fetchFlights() {
      try {
        const url = `https://opensky-network.org/api/states/all`
          + `?lamin=${BBOX.lamin}&lomin=${BBOX.lomin}&lamax=${BBOX.lamax}&lomax=${BBOX.lomax}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const states = (data.states || []).filter(
          s => s[F.LAT] != null && s[F.LON] != null && s[F.ON_GROUND] === false
        );

        const seen = new Set();

        for (const s of states) {
          const id    = s[F.ICAO];
          if (!id) continue;
          seen.add(id);

          const callsign = (s[F.CALLSIGN] || '').trim() || s[F.ICAO]?.toUpperCase() || '?';
          const altFt   = mToFt(s[F.ALT_M]);
          const kts     = msToKts(s[F.VEL_MS]);
          const heading = s[F.TRACK] ?? 0;
          const color   = altColor(altFt);
          const latlng  = [s[F.LAT], s[F.LON]];
          const icon    = L.divIcon({
            className: '',
            html: planeSvg(heading, color),
            iconSize: [36, 36],
            iconAnchor: [18, 18],
            popupAnchor: [0, -20],
          });

          const tooltipContent = altFt != null
            ? `${callsign}<br><span style="font-weight:400;opacity:0.8">${altFt.toLocaleString()} ft</span>`
            : callsign;

          if (markers.has(id)) {
            const m = markers.get(id);
            m.setLatLng(latlng);
            m.setIcon(icon);
            m.setTooltipContent(tooltipContent);
            // Store latest state on marker for enrichedPopup to access
            m._faState = s;
            if (m.isPopupOpen()) {
              const cached = faCache.get(callsign);
              m.getPopup().setContent(enrichedPopup(s, cached ?? null));
            }
          } else {
            const m = L.marker(latlng, { icon }).addTo(map);
            m._faState = s;
            m.bindTooltip(tooltipContent, {
              permanent: true,
              direction: 'top',
              className: 'plane-tooltip',
              offset: [0, -20],
            });
            // Show basic popup immediately; enrich with FlightAware on click
            m.bindPopup(() => enrichedPopup(m._faState, faCache.get(callsign) ?? null), { maxWidth: 280 });
            m.on('popupopen', () => {
              const pop = m.getPopup();
              pop._source = m._faState;
              fetchFlightDetails(callsign, pop);
            });
            markers.set(id, m);
          }
        }

        // Remove planes that left the area
        for (const [id, m] of markers) {
          if (!seen.has(id)) { m.remove(); markers.delete(id); }
        }

        const time = new Date().toLocaleTimeString([], {
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
        statusEl.innerHTML =
          `<span class="count">${states.length}</span> plane${states.length !== 1 ? 's' : ''} overhead &nbsp;·&nbsp; ${time}`;

      } catch (err) {
        console.error('Fetch error:', err);
        statusEl.textContent = 'Connection error — retrying…';
      }
    }

    fetchFlights();
    setInterval(fetchFlights, REFRESH_MS);
  </script>
</body>
</html>
